name: Train Model

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/upload-artifact@v4

    - name: Install dependencies
      run: pip install pandas scikit-learn joblib

    - name: Run training
      run: python train.py

    # 🔥 THIS PART SAVES ARTIFACT
    - name: Upload model artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: model.pkl
